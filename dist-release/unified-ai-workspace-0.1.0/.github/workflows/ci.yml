name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: "true"
  NODE_ENV: test
  PROVIDER_HEALTH_SCHEDULER_ENABLED: "false"

jobs:
  test-build:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Prisma generate
        run: corepack pnpm exec prisma generate

      - name: Prisma validate
        run: corepack pnpm exec prisma validate

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Test
        run: corepack pnpm test

      - name: Build API
        run: corepack pnpm --filter @uaiw/api... build

      - name: Build worker
        run: corepack pnpm --filter @uaiw/worker... build

      - name: Build web
        run: corepack pnpm --filter @uaiw/web... build

  docker-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config

  readiness-smoke:
    name: Ephemeral Readiness Smoke
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Run readiness smoke
        run: corepack pnpm ci:smoke:ready -- --use-existing-redis --redis-url redis://127.0.0.1:6379

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment images
        run: docker compose build api worker web
