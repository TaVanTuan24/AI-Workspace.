services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    image: ${UAIW_API_IMAGE:-unified-ai-workspace-api:${APP_VERSION:-local}}
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        BUILD_SOURCE: ${BUILD_SOURCE:-compose}
    restart: unless-stopped
    init: true
    env_file: ${UAIW_COMPOSE_ENV_FILE:-.env}
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - api-data:/app/.data
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  worker:
    image: ${UAIW_WORKER_IMAGE:-unified-ai-workspace-worker:${APP_VERSION:-local}}
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        BUILD_SOURCE: ${BUILD_SOURCE:-compose}
    restart: unless-stopped
    init: true
    env_file: ${UAIW_COMPOSE_ENV_FILE:-.env}
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - worker-data:/app/.data
      - browser-profiles:/app/.data/browser-profiles
    stop_grace_period: 30s

  web:
    image: ${UAIW_WEB_IMAGE:-unified-ai-workspace-web:${APP_VERSION:-local}}
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        BUILD_SOURCE: ${BUILD_SOURCE:-compose}
    restart: unless-stopped
    init: true
    env_file: ${UAIW_COMPOSE_ENV_FILE:-.env}
    environment:
      API_BASE_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Optional Phase 2 database. Switch DATABASE_URL to PostgreSQL in .env.
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uaiw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uaiw}
      POSTGRES_DB: ${POSTGRES_DB:-uaiw}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-uaiw} -d $${POSTGRES_DB:-uaiw}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  api-data:
  worker-data:
  browser-profiles:
  postgres-data:
